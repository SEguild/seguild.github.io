<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Synergy Effect WAs</title>
        <link rel="stylesheet" type="text/css" href="./weakauras.css" />
        <link rel="stylesheet" type="text/css" href="/css/stylesheet.css" />
    </head>
    <script src="./auras.js"></script>
    <body>
        <div class="bg"></div>
        <div
            class="bgImage bgMask"
            style="
                background-image: url(&quot;/img/classic/mopremix/mopremix_ship.jpg&quot;);
            "
        ></div>
        <div class="content">
            <div class="seHeader">
                <a href="/" style="color: #ffc107">⌂ Synergy Effect</a>
            </div>
            <div class="seHeader">
                <a
                    href="https://github.com/WeakAuras/WeakAuras-Companion/releases"
                    target="_blank"
                    style="color: #b8b8b8"
                >
                    Use WeakAuras-Companion for updated Auras!
                </a>
            </div>
            <div class="flexContainerColumn">
                <div class="centerItem">
                    <h1 class="titleColor">
                        <u>MISTS OF PANDARIA</u>
                        <br />
                        <u>WEAK AURAS</u>
                    </h1>
                </div>
                <h1 class="centerItem"><u>Raids & Dungeons</u></h1>
                <h2 class="centerItem">Raids</h2>
                <div class="flexContainerRow">
                    <span class="wago wagoEmbed">
                        <a href="https://synergyeffectguild.de" target="_blank">
                            <img
                                src="https://media.wago.io/avatars/5f13664464622274d5bf984e/u-1771696644128.webp"
                                class="icon"
                                alt="Fojji Icon"
                            />
                        </a>
                        <button
                            class="wagoCopyButton"
                            title="click to copy"
                            onclick="copyWeakAuraImportString('###TBA###')"
                        >
                            <div class="wagoName">
                                Fojji 1
                                <script type="text/javascript">
                                    document.write(getVersion("###TBA###"));
                                </script>
                            </div>
                        </button>
                    </span>
                </div>
                <h2 class="centerItem">Dungeons</h2>
                <div class="flexContainerRow">
                    <span class="wago wagoEmbed">
                        <a href="https://synergyeffectguild.de" target="_blank">
                            <img
                                src="https://media.wago.io/avatars/5f3e9bb9e17e312e0f46f37c/u-1771706239607.webp"
                                class="icon"
                                alt="Merfin Icon"
                            />
                        </a>
                        <button
                            class="wagoCopyButton"
                            title="click to copy"
                            onclick="copyWeakAuraImportString('###TBA###')"
                        >
                            <div class="wagoName">
                                Merfin Dungeon
                                <script type="text/javascript">
                                    document.write(getVersion("###TBA###"));
                                </script>
                            </div>
                        </button>
                    </span>
                </div>
            </div>
            <div class="extension"></div>
        </div>
    </body>
</html>
